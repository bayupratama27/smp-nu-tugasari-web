<section class="py-16 bg-gray-50">
    <div class="container mx-auto px-4 max-w-3xl">
        <div class="bg-white p-8 rounded-2xl shadow-xl border-t-4 border-emerald-custom">
            <h2 class="text-3xl font-poppins font-bold text-elegant-blue mb-6 text-center">Formulir PPDB Online</h2>
            
            <form action="YOUR_API_URL/api/ppdb" method="POST" enctype="multipart/form-data" class="space-y-6">
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                        <input type="text" name="nama_lengkap" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-custom focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Asal Sekolah</label>
                        <input type="text" name="asal_sekolah" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-custom">
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">Upload Dokumen (Max 2MB)</h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm text-gray-600">Kartu Keluarga (PDF/JPG)</label>
                            <input type="file" name="file_kk" accept=".pdf,.jpg,.jpeg,.png" required class="w-full mt-1 text-sm">
                        </div>
                        <div>
                            <label class="text-sm text-gray-600">Akta Kelahiran (PDF/JPG)</label>
                            <input type="file" name="file_akta" accept=".pdf,.jpg,.jpeg,.png" required class="w-full mt-1 text-sm">
                        </div>
                        <div>
                            <label class="text-sm text-gray-600">Pas Foto (JPG)</label>
                            <input type="file" name="file_foto" accept=".jpg,.jpeg,.png" required class="w-full mt-1 text-sm">
                        </div>
                        <div>
                            <label class="text-sm text-gray-600">Rapor Terakhir (PDF)</label>
                            <input type="file" name="file_rapor" accept=".pdf" required class="w-full mt-1 text-sm">
                        </div>
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="bg-gold-accent text-white font-bold py-3 px-10 rounded-full hover:bg-yellow-500 transition transform hover:scale-105 shadow-lg">
                        Kirim Pendaftaran
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
